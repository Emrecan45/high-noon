<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>High Noon</title>
  <meta name="description" content="High Noon: a first-person 1v1 western duel in 3D. Draw faster than your opponent, online or against the AI." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%232a1706'/%3E%3Ccircle cx='50' cy='50' r='46' fill='none' stroke='%237a4c15' stroke-width='3'/%3E%3Ccircle cx='50' cy='50' r='27' fill='none' stroke='%23e8b64c' stroke-width='9'/%3E%3Ccircle cx='50' cy='50' r='8' fill='%23e8b64c'/%3E%3Crect x='45' y='4' width='10' height='16' rx='2' fill='%23e8b64c'/%3E%3Crect x='45' y='80' width='10' height='16' rx='2' fill='%23e8b64c'/%3E%3Crect x='4' y='45' width='16' height='10' rx='2' fill='%23e8b64c'/%3E%3Crect x='80' y='45' width='16' height='10' rx='2' fill='%23e8b64c'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rye&family=Special+Elite&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./src/style.css" />
  <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
</head>
<body>
  <div id="boot-loading">
    <div class="boot-logo">HIGH NOON</div>
    <div class="boot-bar"><div id="boot-bar-fill"></div></div>
    <div id="boot-pct">0%</div>
  </div>

  <div id="game"></div>

  <div id="hud" class="hidden">
    <div id="score">
      <span id="score-you">0</span>
      <span class="score-sep">-</span>
      <span id="score-opp">0</span>
    </div>
    <div id="round-label"></div>
    <div id="opp-tag"></div>
    <div id="bigmsg" class="hidden"></div>
    <div id="submsg" class="hidden"></div>
    <div id="crosshair" class="hidden"></div>
    <div id="hearts"></div>
    <div id="dodges"></div>
    <div id="gunstate"></div>
    <div id="glare"></div>
    <div id="hitflash"></div>
    <div id="touch-controls" class="hidden">
      <button id="btn-dodge-l" class="touch-btn">◀</button>
      <button id="btn-dodge-r" class="touch-btn">▶</button>
      <button id="btn-fire" class="touch-btn">🔥</button>
    </div>
  </div>

  <div id="backdrop"></div>
  <div id="stage">

  <div id="screen-title" class="screen">
    <div id="topbar">
      <span class="vol">🎵<input id="vol-music" type="range" min="0" max="100" /></span>
      <span class="vol">🔊<input id="vol-sfx" type="range" min="0" max="100" /></span>
      <select id="lang-select" aria-label="Language">
        <option value="en">English</option>
        <option value="fr">Français</option>
        <option value="es">Español</option>
        <option value="de">Deutsch</option>
        <option value="pt">Português</option>
        <option value="ru">Русский</option>
        <option value="tr">Türkçe</option>
      </select>
    </div>
    <div id="profile-chip" class="hidden">
      <img id="chip-head" alt="" />
      <span class="chip-txt"><span id="chip-pseudo"></span><span id="chip-elo"></span></span>
    </div>
    <div id="friends-bar" class="hidden">
      <h3 data-i18n="friendsTitle"></h3>
      <p id="friends-msg" class="hidden"></p>
      <div id="friends-list"></div>
      <p id="friend-addmsg" class="hidden"></p>
      <div id="friend-add" class="friend-add">
        <input id="friend-input" type="text" maxlength="16" autocomplete="off" data-i18n-ph="friendsAddPh" />
        <button id="btn-friend-add" class="btn btn-small" data-i18n="friendsAdd"></button>
      </div>
    </div>
    <button id="friends-toggle" class="hidden" aria-label="Friends">🤝</button>
    <div id="challenges-bar" class="hidden">
      <h3 data-i18n="challengesTitle"></h3>
      <div class="ch-tabs">
        <button id="ch-tab-daily" class="ch-tab active" data-i18n="challengesDaily"></button>
        <button id="ch-tab-weekly" class="ch-tab" data-i18n="challengesWeekly"></button>
      </div>
      <div id="ch-list" class="ch-list"></div>
      <p id="ch-msg" class="ch-msg hidden"></p>
      <button id="btn-home-ad" class="btn btn-small hidden" data-i18n="shopAd"></button>
    </div>
    <button id="challenges-toggle" class="hidden" aria-label="Challenges">🎯</button>
    <h1 class="logo">HIGH NOON</h1>
    <p class="tagline" data-i18n="tagline"></p>
    <div class="menu">
      <button id="btn-ranked" class="btn" data-i18n="btnRanked"></button>
      <button id="btn-ai" class="btn" data-i18n="btnAi"></button>
      <div class="btn-row">
        <button id="btn-shop" class="btn btn-small" data-i18n="btnShop"></button>
        <button id="btn-board" class="btn btn-small" data-i18n="btnBoard"></button>
        <button id="btn-help" class="btn btn-small" data-i18n="btnHelp"></button>
        <button id="btn-patch" class="btn btn-small" data-i18n="btnPatch"></button>
      </div>
      <p id="players-online" class="players-online hidden"></p>
    </div>
    <div class="home-footer">
      <p class="footer-note"><span data-i18n="footer"></span> <a href="https://emrecan45.github.io" target="_blank">Emrecan45</a></p>
      <p class="legal-links">
        <a id="lnk-terms" data-i18n="legalTerms"></a>
        <span class="legal-sep">·</span>
        <a id="lnk-privacy" data-i18n="legalPrivacy"></a>
        <span class="legal-sep">·</span>
        <span id="version-tag"></span>
      </p>
    </div>
  </div>

  <div id="coins-badge" class="hidden">
    <span id="coins-value">0</span>
    <span class="coin-ico">🪙</span>
  </div>

  <div id="screen-opponents" class="screen hidden">
    <h2 data-i18n="chooseOpp"></h2>
    <div id="opponent-cards" class="cards"></div>
    <button id="btn-opp-back" class="btn btn-small" data-i18n="back"></button>
  </div>

  <div id="screen-help" class="screen hidden">
    <h2 data-i18n="helpTitle"></h2>
    <div class="help-text" data-i18n-html="helpHtml"></div>
    <button id="btn-help-back" class="btn btn-small" data-i18n="back"></button>
  </div>

  <div id="screen-profile" class="screen hidden">
    <h2 id="profile-name"></h2>
    <div id="stats-block" class="stats-grid"></div>
    <div id="profile-view"></div>
    <button id="btn-customize" class="btn btn-small" data-i18n="customize"></button>
    <button id="btn-profile-back" class="btn btn-small" data-i18n="back"></button>
  </div>

  <div id="screen-inventory" class="screen hidden">
    <h2 data-i18n="invTitle"></h2>
    <div id="inv-view"></div>
    <div class="inv-scroll">
      <div class="inv-label" data-i18n="invSkins"></div>
      <div id="inv-skins" class="inv-row"></div>
      <div class="inv-label" data-i18n="invWeapons"></div>
      <div id="inv-weapons" class="inv-row"></div>
      <div class="inv-label" data-i18n="invAcc"></div>
      <div id="inv-acc" class="inv-row"></div>
    </div>
    <button id="btn-inv-back" class="btn btn-small" data-i18n="back"></button>
  </div>

  <div id="screen-shop" class="screen hidden">
    <h2 data-i18n="wheelTitle"></h2>
    <div id="wheel-wrap">
      <div id="wheel-pointer">▼</div>
      <canvas id="wheel-canvas" width="380" height="380"></canvas>
    </div>
    <p id="wheel-result" class="hidden"></p>
    <div class="menu">
      <button id="btn-spin" class="btn" data-i18n="wheelSpin"></button>
      <button id="btn-shop-back" class="btn btn-small" data-i18n="back"></button>
    </div>
  </div>

  <div id="screen-patch" class="screen hidden">
    <h2 data-i18n="patchTitle"></h2>
    <div id="patch-list" class="patch-list"></div>
    <button id="btn-patch-back" class="btn btn-small" data-i18n="back"></button>
  </div>

  <div id="legal-modal" class="hidden">
    <div class="legal-card">
      <h3 id="legal-title"></h3>
      <div id="legal-body"></div>
      <button id="legal-close" class="btn btn-small" data-i18n="back"></button>
    </div>
  </div>

  <div id="toast" class="hidden">
    <span id="toast-text"></span>
    <div style="display: flex; gap: 16px; margin-top: 4px;">
      <button id="toast-accept" class="btn btn-small" data-i18n="accept"></button>
      <button id="toast-decline" class="btn btn-small" data-i18n="decline"></button>
    </div>
  </div>

  <div id="screen-board" class="screen hidden">
    <h2 data-i18n="boardTitle"></h2>
    <p id="board-status" class="screen-hint hidden"></p>
    <div id="board-list"></div>
    <button id="btn-board-back" class="btn btn-small" data-i18n="back"></button>
  </div>

  <div id="screen-search" class="screen hidden">
    <h2 id="search-title" data-i18n="searchTitle"></h2>
    <p id="search-timer" class="search-timer">00:00</p>
    <h2 id="search-found-name" class="hidden" style="color: #6fd06f; margin: 16px 0;"></h2>
    <div id="friend-block" class="hidden">
      <p class="screen-hint" data-i18n="friendHint"></p>
      <p id="friend-code" class="friend-code"></p>
      <button id="btn-friend-copy" class="btn btn-small" data-i18n="friendCopy"></button>
    </div>
    <div class="menu">
      <button id="btn-search-cancel" class="btn btn-small" data-i18n="cancel"></button>
    </div>
  </div>

  </div>

  <div id="screen-announce" class="screen overlay opaque hidden">
    <div class="announce-inner">
      <div id="announce-title" class="announce-title"></div>
      <div id="announce-name" class="announce-name"></div>
    </div>
  </div>

  <div id="screen-duelintro" class="screen hidden">
    <div class="di-bar di-top"></div>
    <div class="di-bar di-bottom"></div>
    <div class="di-sun"></div>
    <div class="di-stage">
      <div class="di-side di-you">
        <div class="di-name" id="di-you-name"></div>
        <div class="di-title" id="di-you-title"></div>
        <img class="di-fig" id="di-you-fig" alt="" />
      </div>
      <div class="di-center">
        <div class="di-vs">VS</div>
        <div class="di-tag" data-i18n="duelTag"></div>
      </div>
      <div class="di-side di-opp">
        <div class="di-name" id="di-opp-name"></div>
        <div class="di-title" id="di-opp-title"></div>
        <img class="di-fig" id="di-opp-fig" alt="" />
      </div>
    </div>
  </div>

  <div id="screen-roundend" class="screen overlay hidden">
    <h2 id="roundend-title"></h2>
    <p id="roundend-detail"></p>
    <div id="roundend-times"></div>
    <div class="menu">
      <button id="btn-roundend-next" class="btn" data-i18n="btnContinue"></button>
      <button id="btn-roundend-quit" class="btn btn-small" data-i18n="btnQuit"></button>
    </div>
  </div>

  <div id="screen-perk" class="screen overlay hidden">
    <h2 data-i18n="perkTitle"></h2>
    <div id="perk-cards" class="cards"></div>
  </div>

  <div id="screen-matchend" class="screen hidden">
    <div id="matchend-card">
      <h2 id="matchend-title"></h2>
      <p id="matchend-detail"></p>
      <div id="matchend-recap" class="stats-grid hidden"></div>
      <div class="mend-buttons">
        <button id="btn-menu" class="btn btn-small" data-i18n="menu"></button>
      </div>
    </div>
  </div>

  <div id="cine-overlay" class="hidden">
    <div class="di-bar di-top"></div>
    <div class="di-bar di-bottom"></div>
    <div id="cine-announce" class="cine-announce hidden">
      <div class="ca-title" id="ca-title"></div>
      <div class="ca-name" id="ca-name"></div>
    </div>
    <div class="cine-tag" id="cine-you-tag">
      <span class="cine-name" id="cine-you-name"></span>
      <span class="cine-title" id="cine-you-title"></span>
    </div>
    <div class="cine-tag" id="cine-opp-tag">
      <span class="cine-name" id="cine-opp-name"></span>
      <span class="cine-title" id="cine-opp-title"></span>
    </div>
  </div>

  <div id="lock-prompt" class="screen overlay opaque hidden">
    <h2 data-i18n="lockTitle"></h2>
    <p data-i18n="lockSub"></p>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
