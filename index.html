<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>High Noon</title>
  <meta name="description" content="High Noon: a first-person 1v1 western duel in 3D. Draw faster than your opponent, online or against the AI." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%232a1706'/%3E%3Ccircle cx='50' cy='50' r='46' fill='none' stroke='%237a4c15' stroke-width='3'/%3E%3Ccircle cx='50' cy='50' r='27' fill='none' stroke='%23e8b64c' stroke-width='9'/%3E%3Ccircle cx='50' cy='50' r='8' fill='%23e8b64c'/%3E%3Crect x='45' y='4' width='10' height='16' rx='2' fill='%23e8b64c'/%3E%3Crect x='45' y='80' width='10' height='16' rx='2' fill='%23e8b64c'/%3E%3Crect x='4' y='45' width='16' height='10' rx='2' fill='%23e8b64c'/%3E%3Crect x='80' y='45' width='16' height='10' rx='2' fill='%23e8b64c'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rye&family=Special+Elite&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./src/style.css" />
  <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
</head>
<body>
  <div id="boot-loading">
    <img src="./src/assets/logo.png" alt="HIGH NOON" class="boot-logo">
    <div class="boot-bar"><div id="boot-bar-fill"></div></div>
    <div id="boot-pct">0%</div>
  </div>

  <div id="game"></div>

  <div id="backdrop"></div>
  <div id="stage">

  <div id="hud" class="hidden">
    <div id="score">
      <span id="score-you">0</span>
      <span class="score-sep">-</span>
      <span id="score-opp">0</span>
    </div>
    <div id="round-label"></div>
    <div id="opp-tag"></div>
    <div id="bigmsg" class="hidden"></div>
    <div id="submsg" class="hidden"></div>
    <div id="crosshair" class="hidden"></div>
    <div id="hearts"></div>
    <div id="dodges"></div>
    <div id="gunstate"></div>
    <div id="glare"></div>
    <div id="hitflash"></div>
    <div id="touch-controls" class="hidden">
      <button id="btn-dodge-l" class="touch-btn">◀</button>
      <button id="btn-dodge-r" class="touch-btn">▶</button>
      <button id="btn-fire" class="touch-btn">🔥</button>
    </div>
  </div>

  <div id="screen-title" class="screen">
    <div id="topbar">
      <button id="btn-community" class="topbar-btn" aria-label="Discord">
        <svg class="tb-ico" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M20.317 4.3698a19.7913 19.7913 0 0 0-4.8851-1.5152.0741.0741 0 0 0-.0785.0371c-.211.3753-.4447.8648-.6083 1.2495-1.8447-.2762-3.68-.2762-5.4868 0-.1636-.3933-.4058-.8742-.6177-1.2495a.077.077 0 0 0-.0785-.037 19.7363 19.7363 0 0 0-4.8852 1.515.0699.0699 0 0 0-.0321.0277C.5334 9.0458-.319 13.5799.0992 18.0578a.0824.0824 0 0 0 .0312.0561c2.0528 1.5076 4.0413 2.4228 5.9929 3.0294a.0777.0777 0 0 0 .0842-.0276c.4616-.6304.8731-1.2952 1.226-1.9942a.076.076 0 0 0-.0416-.1057c-.6528-.2476-1.2743-.5495-1.8722-.8923a.077.077 0 0 1-.0076-.1277c.1258-.0943.2517-.1923.3718-.2914a.0743.0743 0 0 1 .0776-.0105c3.9278 1.7933 8.18 1.7933 12.0614 0a.0739.0739 0 0 1 .0785.0095c.1202.099.246.1981.3728.2924a.077.077 0 0 1-.0066.1276 12.2986 12.2986 0 0 1-1.873.8914.0766.0766 0 0 0-.0407.1067c.3604.698.7719 1.3628 1.225 1.9932a.076.076 0 0 0 .0842.0286c1.961-.6067 3.9495-1.5219 6.0023-3.0294a.077.077 0 0 0 .0313-.0552c.5004-5.177-.8382-9.6739-3.5485-13.6604a.061.061 0 0 0-.0312-.0286zM8.02 15.3312c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9555-2.4189 2.157-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.9555 2.4189-2.1569 2.4189zm7.9748 0c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9554-2.4189 2.1569-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.946 2.4189-2.1568 2.4189Z"/></svg>
        <span>Discord</span>
      </button>
      <button id="btn-settings" class="topbar-btn" aria-label="Settings">⚙ <span data-i18n="settingsTitle"></span></button>
    </div>
    <div id="settings-panel" class="screen overlay hidden">
      <div id="settings-card">
        <button id="settings-close" aria-label="Close">✕</button>
        <h3 data-i18n="settingsTitle"></h3>
        <div class="set-row">
          <span class="set-label" data-i18n="settingsLang"></span>
          <select id="lang-select" aria-label="Language">
            <option value="en">English</option>
            <option value="fr">Français</option>
            <option value="es">Español</option>
            <option value="de">Deutsch</option>
            <option value="pt">Português</option>
            <option value="ru">Русский</option>
            <option value="tr">Türkçe</option>
          </select>
        </div>
        <div class="set-row set-slider">
          <span class="set-label">🎵 <span data-i18n="settingsMusic"></span> <b id="music-value"></b></span>
          <input id="vol-music" type="range" min="0" max="100" />
        </div>
        <div class="set-row set-slider">
          <span class="set-label">🔊 <span data-i18n="settingsSfx"></span> <b id="sfx-value"></b></span>
          <input id="vol-sfx" type="range" min="0" max="100" />
        </div>
        <div class="set-row set-slider">
          <span class="set-label">🖱️ <span data-i18n="settingsSens"></span> <b id="sens-value"></b></span>
          <input id="sens-range" type="range" min="0" max="100" />
        </div>
      </div>
    </div>
    <div id="profile-chip" class="hidden">
      <img id="chip-head" alt="" />
      <span class="chip-txt"><span id="chip-pseudo"></span></span>
    </div>
    <div id="friends-bar" class="hidden">
      <button id="friends-close" aria-label="Close">✕</button>
      <h3 data-i18n="friendsTitle"></h3>
      <p id="friends-msg" class="hidden"></p>
      <div id="friends-list"></div>
      <p id="friend-addmsg" class="hidden"></p>
      <div id="friend-add" class="friend-add">
        <input id="friend-input" type="text" maxlength="16" autocomplete="off" data-i18n-ph="friendsAddPh" />
        <button id="btn-friend-add" class="btn btn-small" data-i18n="friendsAdd"></button>
      </div>
    </div>
    <div id="right-rail">
    <div id="event-banner" class="hidden">
      <h3 id="ev-title"></h3>
      <div class="ch-item" id="ev-item">
        <div class="ch-info">
          <div class="ch-label" id="ev-desc"></div>
          <div class="ch-bar"><div class="ch-fill" id="ev-fill"></div></div>
          <div class="ch-prog" id="ev-count"></div>
        </div>
        <div class="ch-reward" id="ev-reward-row">
          <img id="ev-reward-icon" alt="" />
          <span id="ev-reward-name"></span>
        </div>
        <div id="ev-time"></div>
        <button id="btn-ev-claim" class="btn btn-small ch-claim hidden"></button>
      </div>
    </div>
    <div id="challenges-bar" class="hidden">
      <h3 data-i18n="challengesTitle"></h3>
      <div class="ch-tabs">
        <button id="ch-tab-daily" class="ch-tab active" data-i18n="challengesDaily"></button>
        <button id="ch-tab-weekly" class="ch-tab" data-i18n="challengesWeekly"></button>
      </div>
      <div id="ch-list" class="ch-list"></div>
      <p id="ch-msg" class="ch-msg hidden"></p>
    </div>
    <button id="btn-home-reward" class="hidden">
      <span class="had-title" data-i18n="adDaily"></span>
      <span class="had-amount" id="home-reward-amount"></span>
      <span class="reward-go" id="home-reward-go"></span>
    </button>
    </div>
    <button id="challenges-toggle" class="hidden" aria-label="Challenges">🎯</button>
    <div id="hub-title">
      <img src="./src/assets/logo.png" alt="HIGH NOON" class="logo">
      <p class="tagline" data-i18n="tagline"></p>
    </div>
    <div class="menu" id="hub-menu">
      <button id="btn-ranked" class="btn" data-i18n="btnRanked"></button>
      <button id="btn-salon" class="btn" data-i18n="btnFriend"></button>
      <button id="btn-story" class="btn" data-i18n="btnStory"></button>
      <button id="btn-shop" class="btn" data-i18n="btnShop"></button>
      <button id="btn-board" class="btn" data-i18n="btnBoard"></button>
      <button id="btn-minigames" class="btn" data-i18n="btnMinigames"></button>
      <button id="btn-pass" class="btn" data-i18n="btnPass"></button>
      <div class="btn-row">
        <button id="btn-friends" class="btn btn-small" data-i18n="friendsTitle"></button>
        <button id="btn-help" class="btn btn-small" data-i18n="btnHelp"></button>
        <button id="btn-patch" class="btn btn-small" data-i18n="btnPatch"></button>
      </div>
      </div>
    <div style="position: absolute; bottom: 20px; left: max(var(--edge), calc(env(safe-area-inset-left))); z-index: 20;">
      <button id="btn-cg-login" class="btn btn-cg-login hidden" style="margin: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.5);">
        <img src="https://www.google.com/s2/favicons?domain=crazygames.com&sz=64" alt="CG" style="width: 52px; height: 52px; vertical-align: middle; margin-left: 24px; margin-right: 12px; border-radius: 10px;">
        <span data-i18n="cgLogin" style="vertical-align: middle;">Se Connecter</span>
      </button>
    </div>
    <div class="home-footer">
      <p class="footer-note"><span data-i18n="footer"></span> <a href="https://emrecan45.github.io" target="_blank">Emrecan45</a></p>
      <p class="legal-links">
        <a id="lnk-terms" data-i18n="legalTerms"></a>
        <span class="legal-sep">·</span>
        <a id="lnk-privacy" data-i18n="legalPrivacy"></a>
        <span class="legal-sep">·</span>
        <a id="lnk-credits" data-i18n="legalCredits"></a>
        <span class="legal-sep">·</span>
        <span id="version-tag"></span>
      </p>
    </div>
  </div>

  <div id="hud-badges" class="hidden">
    <div id="level-badge" class="hud-badge">
      <span class="lvl-ico">Niv.</span>
      <span class="badge-num" id="level-value">1</span>
      <span class="lvl-xp" id="level-xp">0/200</span>
    </div>
    <div id="coins-badge" class="hud-badge">
      <span id="coins-value">0</span>
      <span class="coin-ico">🪙</span>
    </div>
  </div>

  <div id="screen-help" class="screen station hidden">
    <h2 data-i18n="helpTitle"></h2>
    <div class="help-text" data-i18n-html="helpHtml"></div>
    <button id="btn-help-back" class="btn btn-small" data-i18n="back"></button>
  </div>

  <div id="screen-profile" class="screen docked hidden">
    <div id="profile-left-area">
      <h2 id="profile-name"></h2>
      <div id="profile-id-row">
        <span id="profile-id"></span>
        <button id="btn-copy-id" class="btn btn-small" data-i18n="copyId"></button>
      </div>
    </div>
    <div class="di-poster" id="profile-poster" style="width: 250px; margin-bottom: 12px; margin-top: 10px;"></div>
    <button id="btn-poster-edit" class="btn btn-small" data-i18n="posterEdit"></button>
    <div id="stats-block" class="stats-grid"></div>
    <div id="career-title" data-i18n="careerTitle"></div>
    <div id="career-block" class="stats-grid"></div>
    <div id="profile-view"></div>
    <button id="btn-customize" class="btn btn-small" data-i18n="customize"></button>
    <button id="btn-profile-back" class="btn btn-small" data-i18n="back"></button>
    <div id="poster-editor" class="hidden">
      <h2 data-i18n="invPoster"></h2>
      <div class="ch-tabs" id="poster-tabs"></div>
      <div id="poster-items"></div>
      <button id="btn-poster-back" class="btn btn-small" data-i18n="back"></button>
    </div>
  </div>

  <div id="screen-inventory" class="screen docked hidden">
    <h2 data-i18n="invTitle"></h2>
      <div class="ch-tabs">
        <button id="inv-tab-skins" class="ch-tab active" data-i18n="invSkins"></button>
        <button id="inv-tab-weapons" class="ch-tab" data-i18n="invWeapons"></button>
        <button id="inv-tab-acc" class="ch-tab" data-i18n="invAcc"></button>
      </div>
      <div id="inv-view"></div>
      <input type="range" id="inv-rotation" min="-180" max="180" value="0">
      <div class="inv-scroll">
        <div id="inv-skins" class="inv-grid"></div>
      <div id="inv-weapons" class="inv-grid hidden"></div>
      <div id="inv-acc" class="hidden"></div>
    </div>
    <button id="btn-inv-back" class="btn btn-small" data-i18n="back"></button>
  </div>

  <div id="screen-shop" class="screen station hidden">
    <h2 data-i18n="wheelTitle"></h2>
    <div id="case-window">
      <div id="case-marker"></div>
      <div id="case-strip"></div>
    </div>
    <div id="shop-actions">
      <button id="btn-spin" class="btn" data-i18n="wheelSpin"></button>
      <button id="btn-crate-watch" class="btn hidden"></button>
    </div>
    <div id="reward-crate" class="hidden">
      <p id="reward-crate-title" data-i18n="adUnlockTitle"></p>
      <div id="reward-items"></div>
    </div>
    <button id="btn-shop-back" class="btn btn-small" data-i18n="back"></button>
  </div>

  <div id="screen-pass" class="screen station hidden">
    <h2 id="pass-screen-title"></h2>
    <p id="pass-screen-sub"></p>
    <div id="pass-progress-label"></div>
    <div id="pass-grid"></div>
    <button id="btn-pass-back" class="btn btn-small" data-i18n="back"></button>
  </div>

  <div id="screen-patch" class="screen station hidden">
    <h2 data-i18n="patchTitle"></h2>
    <div id="patch-list" class="patch-list"></div>
    <button id="btn-patch-back" class="btn btn-small" data-i18n="back"></button>
  </div>

  <div id="legal-modal" class="hidden">
    <div class="legal-card">
      <h3 id="legal-title"></h3>
      <div id="legal-body"></div>
      <button id="legal-close" class="btn btn-small" data-i18n="back"></button>
    </div>
  </div>

  <div id="levelup" class="hidden">
    <div id="lvl-caption" data-i18n="statsLevel"></div>
    <div class="lvl-stage">
      <div class="lvl-num" id="lvl-old"><span id="lvl-old-num"></span></div>
      <div class="lvl-num" id="lvl-new"></div>
      <div class="lvl-dust" id="lvl-dust"></div>
    </div>
  </div>

  <div id="toast" class="hidden">
    <span id="toast-text"></span>
    <div style="display: flex; gap: 16px; margin-top: 4px;">
      <button id="toast-accept" class="btn btn-small" data-i18n="accept"></button>
      <button id="toast-decline" class="btn btn-small" data-i18n="decline"></button>
    </div>
  </div>

  <div id="training-status" class="training-status hidden"><span id="training-status-text"></span></div>

  <div id="station-bar" class="hidden">
    <p id="station-hint"></p>
    <button id="btn-station-back" class="btn btn-small" data-i18n="back"></button>
  </div>

  <div id="screen-search" class="screen hidden">
    <h2 id="search-title" data-i18n="searchTitle"></h2>
    <p id="search-timer" class="search-timer">00:00</p>
    <h2 id="search-found-name" class="hidden" style="color: #6fd06f; margin: 16px 0;"></h2>
    <div id="friend-block" class="hidden">
      <p class="screen-hint" data-i18n="friendHint"></p>
      <p id="friend-code" class="friend-code"></p>
      <button id="btn-friend-copy" class="btn btn-small" data-i18n="friendCopy"></button>
    </div>
    <div id="training-block" class="hidden">
      <p class="screen-hint" data-i18n="trainingHint"></p>
      <button id="btn-training" class="btn" data-i18n="btnTraining"></button>
    </div>
    <div class="menu">
      <button id="btn-search-cancel" class="btn btn-small" data-i18n="cancel"></button>
    </div>
  </div>

  <div id="screen-announce" class="screen overlay opaque hidden">
    <div class="announce-inner">
      <div id="announce-title" class="announce-title"></div>
      <div id="announce-name" class="announce-name"></div>
    </div>
  </div>

  <div id="screen-duelintro" class="screen hidden">
    <div class="di-bar di-top"></div>
    <div class="di-bar di-bottom"></div>
    <div class="di-sun"></div>
    <div class="di-stage">
      <div class="di-side di-you">
        <div class="di-poster" id="di-you-poster"></div>
      </div>
      <div class="di-center">
        <div class="di-vs">VS</div>
        <div class="di-tag" data-i18n="duelTag"></div>
      </div>
      <div class="di-side di-opp">
        <div class="di-poster" id="di-opp-poster"></div>
      </div>
    </div>
  </div>

  <div id="screen-roundend" class="screen overlay hidden">
    <h2 id="roundend-title"></h2>
    <p id="roundend-detail"></p>
    <div id="roundend-times"></div>
    <div class="menu">
      <button id="btn-roundend-next" class="btn" data-i18n="btnContinue"></button>
      <button id="btn-roundend-quit" class="btn btn-small" data-i18n="btnQuit"></button>
    </div>
  </div>

  <div id="screen-perk" class="screen overlay hidden">
    <h2 data-i18n="perkTitle"></h2>
    <div id="perk-cards" class="cards"></div>
  </div>

  <div id="screen-matchend" class="screen hidden">
    <div id="matchend-card">
      <h2 id="matchend-title"></h2>
      <p id="matchend-detail"></p>
      <div id="matchend-recap" class="stats-grid hidden"></div>
      <div class="mend-buttons">
        <button id="btn-matchend-friend" class="btn btn-small hidden"></button>
        <button id="btn-menu" class="btn btn-small" data-i18n="menu"></button>
      </div>
    </div>
  </div>

  <div id="popup-overlay" class="screen overlay hidden">
    <div id="popup-card">
      <h2 id="popup-title"></h2>
      <div id="popup-body"></div>
      <button id="btn-popup-ok" class="btn" data-i18n="popupOk"></button>
    </div>
  </div>

  <div id="cine-overlay" class="hidden">
    <div class="di-bar di-top"></div>
    <div class="di-bar di-bottom"></div>
    <div id="cine-announce" class="cine-announce hidden">
      <div class="ca-title" id="ca-title"></div>
      <div class="ca-name" id="ca-name"></div>
    </div>
    <div class="cine-tag" id="cine-you-tag">
      <span class="cine-name" id="cine-you-name"></span>
      <span class="cine-title" id="cine-you-title"></span>
    </div>
    <div class="cine-tag" id="cine-opp-tag">
      <span class="cine-name" id="cine-opp-name"></span>
      <span class="cine-title" id="cine-opp-title"></span>
    </div>
  </div>

  <div id="lock-prompt" class="screen overlay opaque hidden">
    <h2 data-i18n="lockTitle"></h2>
    <p id="lock-error" style="color: #e8b64c; font-size: 14px; margin-top: 10px;"></p>
    <button id="btn-lock-quit" class="btn btn-small" data-i18n="btnQuit"></button>
  </div>

  <div id="story-cine" class="hidden">
    <div class="di-bar di-top"></div>
    <div class="di-bar di-bottom"></div>
    <div id="cine-say" class="hidden">
      <div id="cine-say-name"></div>
      <div id="cine-say-text"></div>
      <div id="cine-say-more" class="hidden">▸</div>
    </div>
    <div id="cine-skip-hint" data-i18n="cineEscHint"></div>
    <div id="cine-pause" class="hidden">
      <h2 data-i18n="cinePauseTitle"></h2>
      <button id="btn-cine-continue" class="btn" data-i18n="btnContinue"></button>
      <button id="btn-cine-quit" class="btn btn-small" data-i18n="btnQuit"></button>
    </div>
  </div>

  <div id="screen-story" class="screen station hidden">
    <h2 id="story-h2" data-i18n="btnStory"></h2>
    <p id="story-sub" class="story-sub hidden" data-i18n="storySub"></p>
    <div id="shelf">
      <div class="shelf-book" id="shelf-ep1">
        <span class="jr-cover-title" data-i18n="storyTitle"></span>
      </div>
      <div class="shelf-book soon">
        <span class="jr-cover-title" data-i18n="jrSoon"></span>
      </div>
      <div class="shelf-book soon">
        <span class="jr-cover-title" data-i18n="jrSoon"></span>
      </div>
    </div>
    <div id="journal" class="hidden">
      <div class="jr-book closed snap" id="jr-book">
        <div class="jr-half jr-half-right">
          <div class="jr-paper jr-paper-right">
            <div class="jr-inner" id="jr-inner-right"></div>
          </div>
        </div>
        <div class="jr-half jr-flap" id="jr-flap">
          <div class="jr-face jr-face-inside">
            <div class="jr-paper jr-paper-left">
              <div class="jr-inner" id="jr-inner-left"></div>
            </div>
          </div>
          <div class="jr-face jr-face-cover">
            <span class="jr-cover-title" data-i18n="storyTitle"></span>
          </div>
        </div>
        <div class="jr-leaf hidden" id="jr-leaf">
          <div class="jr-leaf-face jr-leaf-front" id="jr-leaf-front"></div>
          <div class="jr-leaf-face jr-leaf-back" id="jr-leaf-back"></div>
        </div>
        <div class="jr-spine"></div>
        <button id="jr-prev" class="jr-nav jr-nav-l">❮</button>
        <button id="jr-next" class="jr-nav jr-nav-r">❯</button>
      </div>
      <div class="jr-dots" id="jr-dots"></div>
      <div class="jr-level" id="jr-level"></div>
    </div>
    <button id="btn-story-back" class="btn btn-small" data-i18n="back"></button>
  </div>

  </div>

  <div id="fade-overlay"></div>

  <div id="ban-overlay" class="hidden">
    <div class="ban-box">
      <div class="ban-icon">🚫</div>
      <h2 id="ban-title"></h2>
      <p id="ban-reason"></p>
    </div>
  </div>

  <div id="rotate-gate">
    <svg class="rot-ico" viewBox="0 0 44 72" aria-hidden="true">
      <rect x="2" y="2" width="40" height="68" rx="7" fill="none" stroke="currentColor" stroke-width="4"/>
      <line x1="17" y1="62" x2="27" y2="62" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
    </svg>
    <p data-i18n="rotateDevice"></p>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
