name: Keep Supabase alive

# Ping quotidien pour eviter la mise en veille du projet Supabase gratuit.
on:
  schedule:
    - cron: "23 6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Auth health
        run: |
          curl -sf -o /dev/null -w "HTTP %{http_code}\n" \
            "${{ secrets.SUPABASE_URL }}/auth/v1/health" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}"
